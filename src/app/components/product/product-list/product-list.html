<div class="container my-5">
  <h2 class="text-center mb-4">Our Products</h2>

  <div class="row g-4"> @for (product of products(); track $index) {
      <div class="col-15 col-md-6 col-lg-4 col-xl-3">
        <div class="card h-100 shadow-sm"> <img src="{{product.thumbnail}}" class="card-img-top" alt="Product">
          
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{product.title}}</h5>
            <p class="text-truncate">
              {{product.description}}
            </p>
            <div class="mt-auto"> <span class="h5 d-block mb-3">$99.99</span>
              <button class="btn btn-primary w-100">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    }

  </div>
</div>
