<h2>Signal Form</h2>
<form action="">
  
    <input type="text" placeholder="Email" [formField]="loginForm.email">
    <input type="text" placeholder="Password" [formField]="loginForm.password">

    <br>
    @if (loginForm.email().invalid()) {
        @for (error of loginForm.email().errors(); track $index) {
          <span class="error">*{{ error.message }}</span>
        }
      }

    <br>
    @if (loginForm.password().invalid()) {
        @for (error of loginForm.password().errors(); track $index) {
          <span class="error">*{{ error.message }}</span>
        }
      }
      <br>
    <button (click)="login()">Login</button>
</form>
